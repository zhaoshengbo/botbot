version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: botbot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: botbot
    volumes:
      - mongodb_data:/data/db
    networks:
      - botbot-network

  nginx:
    image: nginx:alpine
    container_name: botbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - botbot-network

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: botbot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=botbot
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
      - API_PREFIX=/api
      - CORS_ORIGINS=*
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=claude-3-5-sonnet-20241022
    volumes:
      - ./be:/app
      - /app/__pycache__
    depends_on:
      - mongodb
    networks:
      - botbot-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile.simple
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://botbot.biz}
    container_name: botbot-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://botbot.biz}
    depends_on:
      - backend
    networks:
      - botbot-network

volumes:
  mongodb_data:
  nginx_logs:

networks:
  botbot-network:
    driver: bridge
