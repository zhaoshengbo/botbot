version: '3.8'

# Development environment with hot reload
# Use: docker-compose -f docker-compose.dev.yml up

services:
  mongodb:
    image: mongo:6.0
    container_name: botbot-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: botbot
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - botbot-network

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: botbot-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./be/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=botbot
      - DEBUG=true
    volumes:
      - ./be:/app
      - /app/__pycache__
    depends_on:
      - mongodb
    networks:
      - botbot-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile.dev
    container_name: botbot-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./fe/.env
    volumes:
      - ./fe:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - botbot-network
    command: npm run dev

volumes:
  mongodb_data_dev:

networks:
  botbot-network:
    driver: bridge
