version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  mongodb:
    image: mongo:6.0
    container_name: botbot-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: botbot
    volumes:
      - mongodb_data:/data/db
    networks:
      - botbot-network
    # 生产环境建议添加认证
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: admin
    #   MONGO_INITDB_ROOT_PASSWORD: your-strong-password

  nginx:
    image: nginx:alpine
    container_name: botbot-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - botbot-network
    # 生产环境日志轮转配置（可选）
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: botbot-backend-prod
    restart: always
    expose:
      - "8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=botbot
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-prod-secret-key-change-this}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-prod-jwt-secret-key-change-this}
      - API_PREFIX=/api
      - CORS_ORIGINS=*
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=claude-3-5-sonnet-20241022
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
    depends_on:
      - mongodb
    networks:
      - botbot-network
    # 生产环境使用生产命令（移除 --reload）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://botbot.biz}
    container_name: botbot-frontend-prod
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://botbot.biz}
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - botbot-network
    # 使用Dockerfile中定义的CMD (node server.js)

volumes:
  mongodb_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  botbot-network:
    driver: bridge
